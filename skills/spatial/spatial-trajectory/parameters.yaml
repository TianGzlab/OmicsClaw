domain: spatial
allowed_extra_flags:
- --method
- --cluster-key
- --root-cell
- --root-cell-type
- --dpt-n-dcs
- --cellrank-n-states
- --cellrank-schur-components
- --cellrank-frac-to-keep
- --cellrank-use-velocity
- --palantir-n-components
- --palantir-knn
- --palantir-num-waypoints
- --palantir-max-iterations
param_hints:
  dpt:
    priority: cluster_key/root_cell/root_cell_type → dpt_n_dcs
    params:
    - cluster_key
    - root_cell
    - root_cell_type
    - dpt_n_dcs
    defaults:
      cluster_key: auto
      root_cell: null
      root_cell_type: null
      dpt_n_dcs: 10
    requires:
    - obsm.X_pca
    - uns.neighbors
    tips:
    - '--cluster-key: wrapper control used for root-cell-type selection and per-cluster
      pseudotime summaries; current OmicsClaw auto-detects common cluster columns
      if omitted.'
    - '--root-cell: exact barcode wrapper control; overrides automatic root selection.'
    - '--root-cell-type: wrapper control that selects the root from a specified annotation
      group.'
    - '--dpt-n-dcs: public `scanpy.tl.dpt` parameter controlling how many diffusion
      components enter pseudotime.'
  cellrank:
    priority: cluster_key/root_cell/root_cell_type → cellrank_use_velocity → cellrank_n_states
      → cellrank_schur_components → cellrank_frac_to_keep
    params:
    - cluster_key
    - root_cell
    - root_cell_type
    - dpt_n_dcs
    - cellrank_use_velocity
    - cellrank_n_states
    - cellrank_schur_components
    - cellrank_frac_to_keep
    defaults:
      cluster_key: auto
      root_cell: null
      root_cell_type: null
      dpt_n_dcs: 10
      cellrank_use_velocity: false
      cellrank_n_states: 3
      cellrank_schur_components: 20
      cellrank_frac_to_keep: 0.3
    requires:
    - obsm.X_pca
    - uns.neighbors
    - cellrank
    tips:
    - '--cellrank-use-velocity: current OmicsClaw wrapper-level preference for `VelocityKernel`;
      if velocity is unavailable the wrapper falls back to pseudotime/connectivity
      or connectivity only and reports the actual kernel mode.'
    - '--cellrank-n-states: public `GPCCA.compute_macrostates(n_states=...)` control.'
    - '--cellrank-schur-components: public `GPCCA.compute_schur(n_components=...)`
      control.'
    - '--cellrank-frac-to-keep: public `PseudotimeKernel.compute_transition_matrix(frac_to_keep=...)`
      control when the pseudotime kernel path is used.'
  palantir:
    priority: cluster_key/root_cell/root_cell_type → palantir_knn → palantir_num_waypoints
      → palantir_n_components → palantir_max_iterations
    params:
    - cluster_key
    - root_cell
    - root_cell_type
    - palantir_n_components
    - palantir_knn
    - palantir_num_waypoints
    - palantir_max_iterations
    defaults:
      cluster_key: auto
      root_cell: null
      root_cell_type: null
      palantir_n_components: 10
      palantir_knn: 30
      palantir_num_waypoints: 1200
      palantir_max_iterations: 25
    requires:
    - obsm.X_pca
    - uns.neighbors
    - palantir
    tips:
    - '--palantir-n-components / --palantir-knn: public `scanpy.external.tl.palantir(...)`
      controls for diffusion-space construction.'
    - '--palantir-num-waypoints / --palantir-max-iterations: public `scanpy.external.tl.palantir_results(...)`
      controls for waypoint sampling and pseudotime refinement.'
    - Current OmicsClaw stores Palantir pseudotime and entropy back into AnnData instead
      of pretending the Scanpy wrapper writes them automatically.
legacy_aliases:
- trajectory
saves_h5ad: true
requires_preprocessed: true
requires:
  bins:
  - python3
  env: []
  config: []
emoji: 🛤️
homepage: https://github.com/TianGzlab/OmicsClaw
os:
- macos
- linux
install:
- kind: pip
  package: scanpy
  bins: []
trigger_keywords:
- trajectory
- pseudotime
- diffusion pseudotime
- DPT
- CellRank
- Palantir
- cell fate
- lineage
script: spatial_trajectory.py
