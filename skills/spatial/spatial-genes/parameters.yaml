domain: spatial
allowed_extra_flags:
- --flashs-bandwidth
- --flashs-n-rand-features
- --fdr-threshold
- --method
- --morans-coord-type
- --morans-corr-method
- --morans-n-neighs
- --morans-n-perms
- --n-top-genes
- --sparkx-max-genes
- --sparkx-num-cores
- --sparkx-option
- --spatialde-aeh-lengthscale
- --spatialde-aeh-patterns
- --spatialde-min-counts
- --spatialde-no-aeh
param_hints:
  morans:
    priority: morans_coord_type → morans_n_neighs → morans_n_perms
    params:
    - morans_coord_type
    - morans_n_neighs
    - morans_n_perms
    - morans_corr_method
    - fdr_threshold
    - n_top_genes
    defaults:
      morans_coord_type: auto
      morans_n_neighs: 6
      morans_n_perms: 100
      morans_corr_method: fdr_bh
      fdr_threshold: 0.05
      n_top_genes: 20
    requires:
    - obsm.spatial
    - X_log_normalized
    tips:
    - '--morans-coord-type: `auto` lets Squidpy infer Visium grid vs generic coordinates.'
    - '--morans-n-neighs: Main locality knob for generic coordinates.'
    - '--morans-n-perms: Permutation depth; set 0 for analytic-only p-values.'
    - '--morans-corr-method: Multiple-testing correction passed to Squidpy/statsmodels.'
  spatialde:
    priority: spatialde_no_aeh → spatialde_min_counts → spatialde_aeh_patterns/aeh_lengthscale
    params:
    - spatialde_no_aeh
    - spatialde_min_counts
    - spatialde_aeh_patterns
    - spatialde_aeh_lengthscale
    - fdr_threshold
    - n_top_genes
    defaults:
      spatialde_no_aeh: false
      spatialde_min_counts: 3
      fdr_threshold: 0.05
      n_top_genes: 20
    requires:
    - obsm.spatial
    - counts_or_raw
    tips:
    - '--spatialde-min-counts: Gene prefilter before Gaussian-process fitting.'
    - '--spatialde-no-aeh: Skip the AEH pattern-grouping stage and only return per-gene
      SpatialDE statistics.'
    - '--spatialde-aeh-patterns / --spatialde-aeh-lengthscale: Optional overrides
      for AEH pattern count `C` and lengthscale `l`.'
  sparkx:
    priority: sparkx_option → sparkx_num_cores → sparkx_max_genes
    params:
    - sparkx_option
    - sparkx_num_cores
    - sparkx_max_genes
    - fdr_threshold
    - n_top_genes
    defaults:
      sparkx_option: mixture
      sparkx_num_cores: 1
      sparkx_max_genes: 5000
      fdr_threshold: 0.05
      n_top_genes: 20
    requires:
    - obsm.spatial
    - counts_or_raw
    - Rscript
    tips:
    - '--sparkx-option: Passed through to `spark.sparkx`; the official SPARK-X example
      uses `mixture`.'
    - '--sparkx-num-cores: Passed through as `numCores` in the R implementation.'
    - '--sparkx-max-genes: OmicsClaw wrapper cap for very large matrices before calling
      SPARK-X.'
  flashs:
    priority: flashs_bandwidth → flashs_n_rand_features
    params:
    - flashs_bandwidth
    - flashs_n_rand_features
    - fdr_threshold
    - n_top_genes
    defaults:
      flashs_n_rand_features: 500
      fdr_threshold: 0.05
      n_top_genes: 20
    requires:
    - obsm.spatial
    - counts_or_raw
    tips:
    - '--flashs-bandwidth: Wrapper-level override for the kernel bandwidth; default
      is estimated from coordinate spread.'
    - '--flashs-n-rand-features: Wrapper-level sketch size controlling FlashS approximation
      fidelity vs runtime.'
legacy_aliases:
- genes
- spatial-svg-detection
saves_h5ad: true
requires_preprocessed: true
requires:
  bins:
  - python3
  env: []
  config: []
emoji: 🧭
homepage: https://github.com/TianGzlab/OmicsClaw
os:
- macos
- linux
install:
- kind: pip
  package: scanpy
  bins: []
- kind: pip
  package: squidpy
  bins: []
trigger_keywords:
- spatially variable gene
- spatial gene
- SVG
- SpatialDE
- SPARK-X
- spatial pattern
- Moran
- spatial autocorrelation
script: spatial_genes.py
