# Runtime contract for the _template skill.  See
# schemas/skills/parameters.schema.yaml for field-by-field reference.

domain: template
script: _template.py
saves_h5ad: false
requires_preprocessed: false

trigger_keywords: []
legacy_aliases: []

# CLI flags accepted in addition to the standard --input / --output / --demo.
# Each entry must start with "--".
allowed_extra_flags:
  - --method

# Per-method parameter hints.  Empty dict is valid.  Each key is the value
# the user passes to --method; each value documents that method's tunables.
param_hints:
  default_method:
    priority: "param_a -> param_b"
    params:
      - param_a
      - param_b
    advanced_params:
      - param_advanced
    defaults:
      param_a: alpha
      param_b: 1.0
      param_advanced: false
    requires:
      - X_input_layer
    tips:
      - Pick param_a first.
