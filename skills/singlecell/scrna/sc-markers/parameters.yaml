domain: singlecell
allowed_extra_flags:
- --groupby
- --method
- --n-genes
- --n-top
- --min-in-group-fraction
- --min-fold-change
- --max-out-group-fraction
- --mu
- --r-enhanced
param_hints:
  wilcoxon:
    priority: groupby -> n_genes -> n_top
    params:
    - groupby
    - n_genes
    - n_top
    advanced_params:
    - min_fold_change
    - min_in_group_fraction
    - max_out_group_fraction
    defaults:
      n_genes: all
      n_top: 10
      min_fold_change: 0.25
      min_in_group_fraction: 0.25
      max_out_group_fraction: 0.5
    requires:
    - normalized_expression
    - group_labels_in_obs
    tips:
    - '--method wilcoxon: safest first-pass default for cluster marker ranking.'
  t-test:
    priority: groupby -> n_genes -> n_top
    params:
    - groupby
    - n_genes
    - n_top
    advanced_params:
    - min_fold_change
    - min_in_group_fraction
    - max_out_group_fraction
    defaults:
      n_genes: all
      n_top: 10
      min_fold_change: 0.25
      min_in_group_fraction: 0.25
      max_out_group_fraction: 0.5
    requires:
    - normalized_expression
    - group_labels_in_obs
    tips:
    - '--method t-test: parametric alternative when users want a simple mean-shift
      test.'
  logreg:
    priority: groupby -> n_genes -> n_top
    params:
    - groupby
    - n_genes
    - n_top
    advanced_params:
    - min_fold_change
    - min_in_group_fraction
    - max_out_group_fraction
    defaults:
      n_genes: all
      n_top: 10
      min_fold_change: 0.25
      min_in_group_fraction: 0.25
      max_out_group_fraction: 0.5
    requires:
    - normalized_expression
    - group_labels_in_obs
    tips:
    - '--method logreg: classification-style ranking for discriminative genes.'
  cosg:
    priority: groupby -> n_genes -> mu
    params:
    - groupby
    - n_genes
    - n_top
    - mu
    defaults:
      n_genes: 50
      n_top: 10
      mu: 1.0
    requires:
    - normalized_expression
    - group_labels_in_obs
    tips:
    - '--method cosg: fast cosine-similarity specificity scoring without p-values.'
    - '--mu: specificity penalty (0-1). Higher values penalize non-target expression
      more.'
    - COSG is especially useful for large datasets where Wilcoxon is slow.
saves_h5ad: true
requires_preprocessed: true
script: sc_markers.py
trigger_keywords: []
legacy_aliases: []
