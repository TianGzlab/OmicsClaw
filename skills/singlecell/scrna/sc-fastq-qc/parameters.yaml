domain: singlecell
requires:
  bins:
  - python3
  env: []
  config: []
emoji: 🧪
homepage: https://github.com/TianGzlab/OmicsClaw
os:
- macos
- linux
install:
- kind: pip
  package: pandas
  bins: []
trigger_keywords:
- scRNA FASTQ QC
- FastQC single-cell
- MultiQC single-cell
- raw read quality
- read-level QC
allowed_extra_flags:
- --max-reads
- --read2
- --sample
- --threads
- --r-enhanced
legacy_aliases:
- scrna-fastq-qc
saves_h5ad: false
requires_preprocessed: false
param_hints:
  fastqc:
    priority: threads -> sample -> read2 -> max_reads
    params:
    - threads
    - sample
    - read2
    - max_reads
    defaults:
      threads: 4
      max_reads: 20000
    requires:
    - fastq_or_fastq_dir
    tips:
    - '--threads: forwarded to FastQC when installed, and used for external tool runs.'
    - '--sample: choose one sample when the input directory contains multiple FASTQ
      groups.'
    - '--max-reads: Python fallback only samples this many reads per FASTQ for lightweight
      local summaries.'
script: sc_fastq_qc.py
