domain: singlecell
allowed_extra_flags:
- --method
- --min-genes
- --min-cells
- --max-mt-pct
- --n-top-hvg
- --n-pcs
- --normalization-target-sum
- --scanpy-hvg-flavor
- --pearson-hvg-flavor
- --pearson-theta
- --seurat-normalize-method
- --seurat-scale-factor
- --seurat-hvg-method
- --sctransform-regress-mt
- --no-sctransform-regress-mt
- --confirmed-preflight
- --r-enhanced
param_hints:
  scanpy:
    priority: min_genes/max_mt_pct -> n_top_hvg -> n_pcs
    params:
    - min_genes
    - max_mt_pct
    - n_top_hvg
    - n_pcs
    advanced_params:
    - min_cells
    - normalization_target_sum
    - scanpy_hvg_flavor
    defaults:
      min_genes: 200
      min_cells: 3
      max_mt_pct: 20.0
      n_top_hvg: 2000
      n_pcs: 50
      normalization_target_sum: 10000.0
      scanpy_hvg_flavor: seurat
    requires:
    - raw_counts
    - scanpy
    tips:
    - '--method scanpy: Python-native base preprocessing up to PCA.'
    - Use `sc-clustering` after this if batch integration is not needed.
  seurat:
    priority: min_genes/max_mt_pct -> n_top_hvg -> n_pcs
    params:
    - min_genes
    - max_mt_pct
    - n_top_hvg
    - n_pcs
    advanced_params:
    - min_cells
    - seurat_normalize_method
    - seurat_scale_factor
    - seurat_hvg_method
    defaults:
      min_genes: 200
      min_cells: 3
      max_mt_pct: 20.0
      n_top_hvg: 2000
      n_pcs: 50
      seurat_normalize_method: LogNormalize
      seurat_scale_factor: 10000.0
      seurat_hvg_method: vst
    requires:
    - raw_counts
    - Rscript
    - Seurat
    - SingleCellExperiment
    - zellkonverter
    tips:
    - '--method seurat: R-backed LogNormalize workflow up to PCA export.'
  sctransform:
    priority: max_mt_pct -> n_top_hvg -> n_pcs
    params:
    - min_genes
    - max_mt_pct
    - n_top_hvg
    - n_pcs
    advanced_params:
    - min_cells
    - sctransform_regress_mt
    defaults:
      min_genes: 200
      min_cells: 3
      max_mt_pct: 20.0
      n_top_hvg: 3000
      n_pcs: 50
      sctransform_regress_mt: true
    requires:
    - raw_counts
    - Rscript
    - Seurat
    - SingleCellExperiment
    - zellkonverter
    - sctransform
    tips:
    - '--method sctransform: R-backed SCTransform workflow up to PCA export.'
  pearson_residuals:
    priority: min_genes/max_mt_pct -> n_top_hvg -> n_pcs
    params:
    - min_genes
    - max_mt_pct
    - n_top_hvg
    - n_pcs
    advanced_params:
    - min_cells
    - pearson_hvg_flavor
    - pearson_theta
    defaults:
      min_genes: 200
      min_cells: 3
      max_mt_pct: 20.0
      n_top_hvg: 2000
      n_pcs: 50
      pearson_hvg_flavor: seurat_v3
      pearson_theta: 100.0
    requires:
    - raw_counts
    - scanpy
    tips:
    - '--method pearson_residuals: raw-count HVG selection plus Pearson residual modeling,
      while exporting a normalized public matrix and PCA.'
legacy_aliases:
- sc-preprocess
saves_h5ad: true
requires_preprocessed: false
requires:
  bins:
  - python3
  env: []
  config: []
emoji: 🧫
homepage: https://github.com/OmicsClaw/OmicsClaw
os:
- macos
- linux
install:
- kind: pip
  package: scanpy
  bins: []
trigger_keywords:
- single cell preprocess
- scRNA preprocessing
- normalize hvg pca
- base preprocessing
- Seurat preprocessing
- SCTransform preprocessing
script: sc_preprocess.py
