domain: singlecell
allowed_extra_flags:
- --batch-key
- --method
- --n-epochs
- --no-gpu
- --n-latent
- --labels-key
- --harmony-theta
- --bbknn-neighbors-within-batch
- --scanorama-knn
- --integration-features
- --integration-pcs
- --simba-n-top-genes
- --simba-n-components
- --simba-k
- --simba-num-workers
- --r-enhanced
param_hints:
  harmony:
    priority: batch_key
    params:
    - batch_key
    advanced_params:
    - harmony_theta
    - integration_pcs
    defaults:
      batch_key: batch
      harmony_theta: 2.0
      integration_pcs: 50
    requires:
    - existing_PCA_or_computeable_PCA
    - harmonypy
    tips:
    - '--method harmony: Default integration path in the current wrapper.'
  scvi:
    priority: batch_key -> n_epochs -> no_gpu
    params:
    - batch_key
    - n_epochs
    advanced_params:
    - n_latent
    - no_gpu
    defaults:
      batch_key: batch
      n_epochs: 400
      n_latent: 30
      no_gpu: false
    requires:
    - scvi
    - torch
    tips:
    - '--n-epochs: Main runtime/optimization knob for scVI.'
  scanvi:
    priority: batch_key -> n_epochs -> no_gpu
    params:
    - batch_key
    - labels_key
    - n_epochs
    advanced_params:
    - n_latent
    - no_gpu
    defaults:
      batch_key: batch
      labels_key: null
      n_epochs: 200
      n_latent: 30
      no_gpu: false
    requires:
    - scvi
    - torch
    - labels_in_obs
    tips:
    - If no labels are available, the current wrapper falls back to `scvi`.
  bbknn:
    priority: batch_key
    params:
    - batch_key
    advanced_params:
    - bbknn_neighbors_within_batch
    defaults:
      batch_key: batch
      bbknn_neighbors_within_batch: 3
    requires:
    - bbknn
    - existing_PCA_or_computeable_PCA
    tips:
    - '--method bbknn: Lightweight graph correction path.'
  scanorama:
    priority: batch_key
    params:
    - batch_key
    advanced_params:
    - scanorama_knn
    defaults:
      batch_key: batch
      scanorama_knn: 20
    requires:
    - scanorama
    tips:
    - '--method scanorama: Panorama-stitching integration path.'
  fastmnn:
    priority: batch_key
    params:
    - batch_key
    advanced_params:
    - integration_features
    - integration_pcs
    defaults:
      batch_key: batch
      integration_features: 2000
      integration_pcs: 30
    requires:
    - R_batchelor_stack
    tips:
    - '--method fastmnn: R-backed batchelor fastMNN path via the shared H5AD bridge.'
  seurat_cca:
    priority: batch_key
    params:
    - batch_key
    advanced_params:
    - integration_features
    - integration_pcs
    defaults:
      batch_key: batch
      integration_features: 2000
      integration_pcs: 30
    requires:
    - R_Seurat_stack
    tips:
    - '--method seurat_cca: R-backed Seurat CCA integration path via the shared H5AD
      bridge.'
  seurat_rpca:
    priority: batch_key
    params:
    - batch_key
    advanced_params:
    - integration_features
    - integration_pcs
    defaults:
      batch_key: batch
      integration_features: 2000
      integration_pcs: 30
    requires:
    - R_Seurat_stack
    tips:
    - '--method seurat_rpca: R-backed Seurat RPCA integration path via the shared
      H5AD bridge.'
legacy_aliases:
- sc-integrate
saves_h5ad: true
requires_preprocessed: true
requires:
  bins:
  - python3
  env: []
  config: []
emoji: S
homepage: https://github.com/OmicsClaw/OmicsClaw
os:
- macos
- linux
install:
- kind: pip
  package: scanpy
  bins: []
trigger_keywords:
- batch integration
- batch effect
- harmony
- scvi
- bbknn
- merge samples
script: sc_integrate.py
