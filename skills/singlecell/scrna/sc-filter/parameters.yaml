domain: singlecell
allowed_extra_flags:
- --doublet-score-threshold
- --max-counts
- --max-genes
- --max-mt-percent
- --min-cells
- --min-counts
- --min-genes
- --no-remove-doublets
- --r-enhanced
- --tissue
param_hints:
  threshold_filtering:
    priority: tissue -> min_genes/max_mt_percent -> min_cells -> count caps
    params:
    - tissue
    - min_genes
    - max_genes
    - min_counts
    - max_counts
    - max_mt_percent
    - min_cells
    defaults:
      min_genes: 200
      max_mt_percent: 20.0
      min_cells: 3
    requires:
    - qc_metrics_in_obs_or_count_like_matrix_in_X
    - scanpy
    tips:
    - '--tissue: Wrapper-level preset that overrides the default QC thresholds with
      OmicsClaw tissue heuristics.'
    - '--min-genes / --max-mt-percent: Main cell-retention controls.'
    - '--min-cells: Gene-level retention threshold applied after cell filtering.'
saves_h5ad: true
requires_preprocessed: false
requires:
  bins:
  - python3
  env: []
  config: []
emoji: S
homepage: https://github.com/OmicsClaw/OmicsClaw
os:
- macos
- linux
install: []
trigger_keywords:
- filter cells
- cell filtering
- gene filtering
- remove low quality
- qc filtering
- tissue-specific thresholds
script: sc_filter.py
legacy_aliases: []
