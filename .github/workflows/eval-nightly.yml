name: Behavioral Parity Eval (weekly)

# Runs the @pytest.mark.eval suite against the production prompt + tool list
# every Monday at midnight UTC. Skipped automatically when
# secrets.ANTHROPIC_API_KEY is not configured (e.g. on forks), so PRs
# from contributors don't fail when they lack credentials.

on:
  schedule:
    - cron: "0 0 * * 1"  # Mondays 00:00 UTC
  workflow_dispatch:      # also allow manual trigger

jobs:
  eval:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.repository == 'TianGzlab/OmicsClaw' }}
    timeout-minutes: 15
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal eval deps
        run: |
          python -m pip install --upgrade pip
          # Only deps the eval harness actually exercises — avoids the
          # heavy bioinformatics stack (scanpy / R / etc) that the eval
          # corpus doesn't touch.
          pip install -e .
          pip install pytest pytest-asyncio openai anthropic

      - name: Detect missing API key (graceful skip)
        id: detect_key
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ] && [ -z "${{ secrets.LLM_API_KEY }}" ]; then
            echo "no_credentials=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Eval workflow has no API key secret configured; nothing to run."
          else
            echo "no_credentials=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run eval suite
        if: steps.detect_key.outputs.no_credentials != 'true'
        env:
          # Prefer ANTHROPIC_API_KEY (Anthropic native); fall back to LLM_API_KEY.
          LLM_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL || 'https://api.anthropic.com/v1' }}
          EVAL_MODEL: ${{ vars.EVAL_MODEL || 'claude-sonnet-4-6' }}
        run: |
          python scripts/run_eval.py

      - name: Upload eval artifacts
        if: always() && steps.detect_key.outputs.no_credentials != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.run_id }}
          path: tests/eval/results/
          retention-days: 30
          if-no-files-found: warn
